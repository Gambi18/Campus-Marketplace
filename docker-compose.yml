# Default stack: builds self-contained production images. Works the same on
# Linux and Windows (Docker Desktop / WSL2) — no Go or Node needed on the host.
#
#   docker compose up --build
#
# For hot-reload development, layer the dev override on top:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# Values come from a root .env file if present (copy .env.example -> .env);
# every variable has a safe dev default so `docker compose up` works with none.

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-marketplace}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-campus_marketplace}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-marketplace} -d ${DB_NAME:-campus_marketplace}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (Go). Runs DB migrations on startup.
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      PORT: "8080"
      ENV: ${ENV:-development}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-marketplace}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-campus_marketplace}
      # Required — the server refuses to start without a JWT secret. The default
      # is dev-only; set a long random value via the root .env for anything real.
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
      # Optional integrations — uploads fall back to local disk and payments can
      # be bypassed for testing when these are unset.
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      CAMPAY_BASE_URL: ${CAMPAY_BASE_URL:-https://demo.campay.net/api}
      CAMPAY_APP_USERNAME: ${CAMPAY_APP_USERNAME:-}
      CAMPAY_APP_PASSWORD: ${CAMPAY_APP_PASSWORD:-}
      CAMPAY_PERMANENT_TOKEN: ${CAMPAY_PERMANENT_TOKEN:-}
      DEV_BYPASS_PAYMENT: ${DEV_BYPASS_PAYMENT:-true}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@campusmarket.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-password}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Persist the local-disk upload fallback across container rebuilds.
      - backend_uploads:/app/uploads

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the browser bundle at build time, so these must point at the
        # host-published backend port, not the internal `backend` service name.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8080}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:

networks:
  default:
    name: campus-marketplace
